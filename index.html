<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
     <!-- Link to CSS Page -->
    <link rel="stylesheet" href="login.css">
     <!-- Link to font awesome -->
     <script src="https://kit.fontawesome.com/3f2c79e1ec.js" crossorigin="anonymous"></script>
</head>
<body>
    <div class="login-card">

        <!-- Navbar -->
        <div class="header">
            <a href="#"><i class="fa-solid fa-angle-left" style="color: rgb(10, 10, 10);"></i></a>
            <span class="logo-text">Logo</span>
            <a href="#"><i class="fa-solid fa-x" style="color: rgb(10, 10, 10);"></i></a>
        </div>

        <h1>Login</h1>
        
        <!-- Login Details -->
        <form id="loginForm">
            <div class="input-row">
                <input type="email" id="email" placeholder="Email Address*" required>
                <div id="emailError"></div>
                <svg width="18" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="e-icon">
                    <path d="M22.08 4.32007H1.92C0.863975 4.32007 0 5.18409 0 6.24007V17.7601C0 18.816 0.863975 19.6801 1.92 19.6801H22.08C23.136 19.6801 24 18.816 24 17.7601V6.24007C24 5.18409 23.136 4.32007 22.08 4.32007ZM21.6 5.28012L12 13.6321L2.39997 5.28012H21.6ZM1.24797 18.4321C1.05597 18.2401 0.96 18.0481 0.96 17.7601V6.24007C0.96 5.95209 1.05603 5.76009 1.24797 5.56804L8.64 12.0001L1.24797 18.4321ZM2.39997 18.7201L9.408 12.6721L12 14.8801L14.592 12.6721L21.6 18.7201L2.39997 18.7201ZM23.04 17.7601C23.04 18.048 22.944 18.24 22.752 18.4321L15.36 12.0001L22.752 5.56804C22.944 5.76004 23.04 5.95204 23.04 6.24007V17.7601Z" fill="#6813B3"/>
                    </svg>
                    
                <input type="password" id="password" placeholder="Password*" required>
                <div id="passwordError"></div>
            </div>
            
            <a href="#" class="forgot-password">Forgot Password?</a>
            
            <button type="submit" class="btn-get-started">Get Started</button>
        </form>
        
        <p class="signup-text">Don't have an account? <a href="#">Sign up</a></p>

    </div>

    <!-- Javascript -->
     <script src="login.js"></script>
</body>
</html>
